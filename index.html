            background: rgba(20, 25, 35, 0.85); backdrop-filter: blur(2px);
            border-radius: 28px; border: 1px solid #4a3e2c; padding: 20px 24px; margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        .card h2 { border-left: 6px solid #c97e2c; padding-left: 14px; margin-bottom: 18px; font-weight: 500; color: #f0d89e; }

        .input-group { flex: 1; min-width: 120px; }
        .input-group label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #b9aa82; letter-spacing: 1px; }
        input, select, button {
            background: #1e272b; border: 1px solid #5f5338; padding: 8px 12px;
            border-radius: 20px; color: #f0efda; font-size: 0.9rem; width: 100%;
            font-family: inherit;
        }
        button {
            background: #5c3e1f; border-color: #b87c3a; cursor: pointer; font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #7a572f; box-shadow: 0 0 6px #e2a34a; }
        button:disabled { background: #3a3a2a; border-color: #5a5a3a; cursor: not-allowed; opacity: 0.6; }
        .logout-btn { background: #3a2a1c; border-color: #aa6f3c; }
        .inventory-grid, .building-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
            max-height: 420px;
            overflow-y: auto;
            padding: 6px;
        }
        .inv-item, .building-item {
            background: #131a1f; border-radius: 18px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #d6903a; font-size: 0.85rem;
        }
        .inv-name {
            word-break: break-word;
            max-width: 65%;
            cursor: pointer;
            text-decoration: underline dotted #b87c3a;
        }
        .inv-qty {
            background: #2e2a21;
            padding: 2px 8px;
            border-radius: 40px;
            font-weight: bold;
        }
        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
        }
        .recipe-card {
            background: #1b2329;
            border-radius: 18px;
            padding: 12px;
            border: 1px solid #7c673d;
        }
        .recipe-name {
            font-weight: bold;
            color: #efb87e;
            font-size: 1.1rem;
        }
        .recipe-desc {
            font-size: 0.75rem;
            color: #b8b08a;
            margin: 4px 0 8px 0;
            font-style: italic;
            border-left: 2px solid #7c673d;
            padding-left: 8px;
        }
        .recipe-cost {
            font-size: 0.75rem;
            color: #b9b082;
            margin: 6px 0;
        }
        .craft-btn, .fish-btn, .upgrade-btn, .add-item-btn {
            background: #3a5626;
            width: auto;
            padding: 6px 18px;
            margin-top: 6px;
            border-radius: 40px;
        }
        .alert {
            background: #422c1a;
            border-radius: 20px;
            padding: 10px;
            margin: 12px 0;
            color: #ffcd94;
            font-size: 0.8rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .badge {
            background: #2c5a3a;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .search-panel {
            background: #1e2a24;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #6a5a40;
        }
        .backup-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .backup-btn {
            background: #3a5a3a;
            border-color: #7a9a7a;
            width: auto;
            padding: 6px 16px;
        }
        .house-level {
            background: #4a3a2a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
    </style>
</head>

    function getRandomItemByTier(tier) {
        let pool = tier===3?TIER_3_ITEMS:(tier===4?TIER_4_ITEMS:TIER_5_ITEMS);
        if(!pool.length) return {name:"残羹剩饭",amount:1};
        const idx = Math.floor(Math.random()*pool.length);
        return {...pool[idx]};
    }
    function getTierByStats(intel,insp,luck) {
        let prob4=0.3, prob5=0;
        if(intel>=4) prob4+=0.2; if(insp>=4) prob4+=0.2; if(luck>=4) prob4+=0.2;
        if(intel===6) prob5+=0.1; if(insp===6) prob5+=0.1; if(luck===6) prob5+=0.1;
        prob4=Math.min(prob4,0.9); prob5=Math.min(prob5,0.3);
        const r=Math.random();
        if(r<prob5) return 5;
        if(r<prob5+prob4) return 4;
        return 3;
    }
    function performLoot(intel,insp,luck) {
        const tier=getTierByStats(intel,insp,luck);
        const item=getRandomItemByTier(tier);
        return {...item};
    }
    function mergeInventory(inv) {
        const map=new Map();
        for(const it of inv) {
            const key=it.name;
            if(map.has(key)) map.get(key).amount+=it.amount;
            else map.set(key,{name:key,amount:it.amount});
        }
        return Array.from(map.values());
    }
    function getBeijingDate() {
        const now=new Date();
        const offset=8*60;
        const localOffset=now.getTimezoneOffset();
        const beijing=new Date(now.getTime()+(offset+localOffset)*60000);
        return beijing.toISOString().slice(0,10);
    }
    function checkAndResetFreeSearches(user) {
        const today=getBeijingDate();
        if(!user.lastFreeReset||user.lastFreeReset!==today) {
            user.freeSearches=1;
            user.lastFreeReset=today;
            // 重置免费鱼饵合成次数
            user.freeBaitCraftedToday = 0;
            return true;
        }
        return false;
    }

            <div class="card" style="max-width:600px;margin:0 auto;"><h2>⚙️ 身份辨识</h2>
            <div id="auth-tab"><div style="display:flex;gap:12px;margin-bottom:20px;"><button id="btn-login-tab">登录</button><button id="btn-reg-tab">创建新幸存者</button></div>
            <div id="login-panel"><div class="input-group"><label>账号</label><input id="login-username"></div><div class="input-group"><label>密码</label><input id="login-password" type="password"></div><button id="do-login">进入废土</button><div id="login-msg" class="alert" style="display:none;"></div></div>
            <div id="reg-panel" style="display:none;"><div class="input-group"><label>账号</label><input id="reg-username"></div><div class="input-group"><label>密码</label><input id="reg-password" type="password"></div><div class="input-group"><label>幸存者姓名</label><input id="reg-name"></div>
            <div style="background:#1e262a;padding:12px;border-radius:18px;margin:12px 0;"><div class="flex-between"><span>🧠 点数分配 (总计≤16，单项1~6)</span><span id="points-left">剩余16</span></div>
            <div class="form-row"><div class="input-group"><label>力量</label><input id="stat-str" type="number" min="1" max="6" value="3"></div><div class="input-group"><label>速度</label><input id="stat-spd" type="number" min="1" max="6" value="3"></div><div class="input-group"><label>智力</label><input id="stat-int" type="number" min="1" max="6" value="3"></div><div class="input-group"><label>灵感</label><input id="stat-ins" type="number" min="1" max="6" value="3"></div><div class="input-group"><label>幸运</label><input id="stat-luck" type="number" min="1" max="6" value="3"></div></div></div>
            <button id="do-register">于灰烬中诞生</button><div id="reg-msg" class="alert" style="display:none;"></div></div></div></div>`;
        document.getElementById("btn-login-tab").onclick=()=>{document.getElementById("login-panel").style.display="block";document.getElementById("reg-panel").style.display="none";};
        document.getElementById("btn-reg-tab").onclick=()=>{document.getElementById("login-panel").style.display="none";document.getElementById("reg-panel").style.display="block";updatePointsLeft();};
        document.getElementById("do-login").onclick=doLogin;
        document.getElementById("do-register").onclick=doRegister;
        function updatePointsLeft() {
            const str=+document.getElementById("stat-str").value||0, spd=+document.getElementById("stat-spd").value||0, int=+document.getElementById("stat-int").value||0, ins=+document.getElementById("stat-ins").value||0, luck=+document.getElementById("stat-luck").value||0;
            const total=str+spd+int+ins+luck;
            document.getElementById("points-left").innerText=`剩余${16-total}`;
        }
        function doLogin() {
            const username=document.getElementById("login-username").value.trim();
            const pwd=document.getElementById("login-password").value;
            const users=loadUsers();
            const user=users.find(u=>u.username===username && u.password===pwd);
            if(user) {
                if(!user.usedPasswords) user.usedPasswords=[];
                if(!user.buildingLevel) user.buildingLevel=0;
                if(!user.freeBaitCraftedToday) user.freeBaitCraftedToday=0;
                if(!user.baitCount) user.baitCount={初级:0,中级:0,高级:0};
                checkAndResetFreeSearches(user);
                currentUser=user;
                render();
            } else {
                document.getElementById("login-msg").innerText="身份验证失败";
                document.getElementById("login-msg").style.display="block";
            }
        }
        function doRegister() {
            const username=document.getElementById("reg-username").value.trim();
            const pwd=document.getElementById("reg-password").value;
            const name=document.getElementById("reg-name").value.trim();
            const str=+document.getElementById("stat-str").value, spd=+document.getElementById("stat-spd").value, int=+document.getElementById("stat-int").value, ins=+document.getElementById("stat-ins").value, luck=+document.getElementById("stat-luck").value;
            const total=str+spd+int+ins+luck;
            if(!username||!pwd||!name) {alert("请填满信息");return;}
            if(total>16||str<1||spd<1||int<1||ins<1||luck<1||str>6||spd>6||int>6||ins>6||luck>6){alert("点数不合规");return;}
            const users=loadUsers();
            if(users.find(u=>u.username===username)){alert("账号已存在");return;}
            const inventory=JSON.parse(JSON.stringify(BASE_INVENTORY));
            const stats={strength:str,speed:spd,intelligence:int,inspiration:ins,luck:luck};
            const newUser={
                username, password:pwd, survivorName:name, stats, inventory,
                freeSearches:2, lastFreeReset:getBeijingDate(), usedPasswords:[],
                buildingLevel:0, freeBaitCraftedToday:0, baitCount:{初级:0,中级:0,高级:0}
            };
            users.push(newUser);
            saveUsers(users);
            currentUser=newUser;
            render();
        }
    }

    // =============================================================
    // 主面板
    // =============================================================
    function renderDashboard(container) {
        const stats=currentUser.stats;
        const freeLeft=currentUser.freeSearches;
        const houseLevel = BUILDING_LEVELS[currentUser.buildingLevel];
        const houseName = houseLevel ? houseLevel.name : "无住所";
        const houseDesc = houseLevel ? houseLevel.description : "你还没有建造任何住所，快收集材料建造一个吧！";
        container.innerHTML=`
            <div class="flex-between"><div><h1>🏕️ ${currentUser.survivorName} 的避难记录</h1></div><button id="logout-btn" class="logout-btn">离开废土</button></div>
            <div class="card"><h2>📜 幸存者档案</h2><div>力量 ${stats.strength} | 速度 ${stats.speed} | 智力 ${stats.intelligence} | 灵感 ${stats.inspiration} | 幸运 ${stats.luck} (总${stats.strength+stats.speed+stats.intelligence+stats.inspiration+stats.luck}/16)</div>
            <div class="search-panel"><div class="badge">✨ 今日免费搜寻: ${freeLeft} 次</div><button id="free-search-btn">🔍 免费搜寻</button><div class="input-group"><label>物资密码</label><input id="password-input"></div><button id="pwd-search-btn">🔐 密码搜寻</button></div></div>
            <div class="card"><h2>📦 随身物资 <span style="font-size:0.7rem;">(点击名称查看描述)</span></h2><div id="inventory-list" class="inventory-grid"></div></div>
            <div class="card"><h2>🏠 住所</h2><div><span class="house-level">当前等级：${houseName}</span><p>${houseDesc}</p><div id="building-panel"></div></div></div>
            <div class="card"><h2>🎣 钓鱼系统</h2><div id="fishing-panel"></div></div>
            <div class="card"><h2>➕ 自主添加物资</h2><div class="search-panel"><div class="input-group"><label>物品名称</label><input id="add-item-name" placeholder="例如：树枝"></div><div class="input-group"><label>数量</label><input id="add-item-qty" type="number" min="1" value="1"></div><button id="add-item-btn" class="add-item-btn">添加物资</button></div><div id="add-msg" class="alert" style="display:none;"></div></div>
            <div class="card"><h2>⚒️ 废土工坊 · 合成</h2><div class="recipe-list" id="recipe-list"></div><div id="craft-msg" class="alert"></div></div>
            <div class="card"><h2>💾 数据备份</h2><div class="backup-buttons"><button id="save-backup" class="backup-btn">💾 保存备份到会话存储</button><button id="load-backup" class="backup-btn">📂 从会话存储恢复备份</button></div><div id="backup-msg" class="alert" style="display:none;"></div></div>
            <footer>⚠️ 每日0点重置免费搜寻和免费鱼饵合成次数。钓鱼需要钓鱼套组和鱼饵。不同鱼饵影响钓鱼成功率，稀有鱼类概率较低。</footer>`;
        document.getElementById("logout-btn").onclick=()=>{currentUser=null;render();};
        document.getElementById("free-search-btn").onclick=performFreeSearch;
        document.getElementById("pwd-search-btn").onclick=()=>{const pwd=document.getElementById("password-input").value.trim();if(pwd)performPasswordSearch(pwd);else showMsg("请输入密码","#craft-msg");};
        document.getElementById("save-backup").onclick=saveToSessionStorage;
        document.getElementById("load-backup").onclick=loadFromSessionStorage;
        document.getElementById("add-item-btn").onclick=addCustomItem;
        refreshInventoryDisplay();
        renderRecipes();
        renderBuildingPanel();
        renderFishingPanel();
    }

    function refreshInventoryDisplay() {
        const div=document.getElementById("inventory-list");
        if(!div) return;
        const inv=currentUser.inventory;
        if(!inv.length){div.innerHTML="<div>空无一物</div>";return;}
        div.innerHTML=inv.map(item=>`<div class="inv-item"><span class="inv-name" title="${getItemDescription(item.name)}" onclick="alert('${getItemDescription(item.name).replace(/'/g,"\\'")}')">${item.name}</span><span class="inv-qty">✖️${item.amount}</span></div>`).join("");
    }

    function performFreeSearch() {
        checkAndResetFreeSearches(currentUser);
        if(currentUser.freeSearches<=0){showMsg("今日免费次数已用完","#craft-msg");return;}
        const stats=currentUser.stats;
        const loots=[];
        for(let i=0;i<3;i++){
            loots.push(performLoot(stats.intelligence,stats.inspiration,stats.luck));
        }
        alert("🔍 搜寻获得：\n" + loots.map(l => `${l.name} x${l.amount}`).join("\n"));
        for(const loot of loots){
            currentUser.inventory.push(loot);
            currentUser.inventory=mergeInventory(currentUser.inventory);
        }
        currentUser.freeSearches--;
        updateUser();
        showMsg(`获得 ${loots.length} 个物资`,"#craft-msg");
        refreshInventoryDisplay();
    }

    function performPasswordSearch(pwd) {
        const valid=Array.from({length:50},(_,i)=>(1001+i).toString());
        if(!valid.includes(pwd)){showMsg("密码错误","#craft-msg");return;}
        if(currentUser.usedPasswords.includes(pwd)){showMsg(`密码 ${pwd} 已使用过`,"#craft-msg");return;}
        const stats=currentUser.stats;
        const loots=[];
        for(let i=0;i<3;i++){
            loots.push(performLoot(stats.intelligence,stats.inspiration,stats.luck));
        }
        alert("🔐 密码搜寻获得：\n" + loots.map(l => `${l.name} x${l.amount}`).join("\n"));
        for(const loot of loots){
            currentUser.inventory.push(loot);
            currentUser.inventory=mergeInventory(currentUser.inventory);
        }
        currentUser.usedPasswords.push(pwd);
        updateUser();
        showMsg(`获得 ${loots.length} 个物资`,"#craft-msg");
        refreshInventoryDisplay();
    }

    // 自主添加物资
    function addCustomItem() {
        const name = document.getElementById("add-item-name").value.trim();
        const qty = parseInt(document.getElementById("add-item-qty").value);
        if(!name || isNaN(qty) || qty<=0) {
            showMsg("请输入有效的物品名称和数量","#add-msg");
            return;
        }
        currentUser.inventory.push({name:name, amount:qty});
        currentUser.inventory = mergeInventory(currentUser.inventory);
        updateUser();
        showMsg(`成功添加 ${qty} 个 ${name}`,"#add-msg");
        refreshInventoryDisplay();
        renderRecipes(); // 刷新合成按钮
        document.getElementById("add-item-name").value = "";
        document.getElementById("add-item-qty").value = "1";
    }

    // 建筑系统
    function renderBuildingPanel() {
        const panel = document.getElementById("building-panel");
        if(!panel) return;
        const currentLevel = currentUser.buildingLevel;
        if(currentLevel >= BUILDING_LEVELS.length - 1) {
            panel.innerHTML = "<div>你已经建造了最高等级的住所！</div>";
            return;
        }
        const nextLevel = BUILDING_LEVELS[currentLevel+1];
        const costHtml = Object.entries(nextLevel.cost).map(([mat, qty]) => `${mat} x${qty}`).join(", ");
        const toolsHtml = nextLevel.requiredTools.length ? `需要工具: ${nextLevel.requiredTools.join(", ")}` : "";
        panel.innerHTML = `
            <div>下一级: ${nextLevel.name}</div>
            <div>描述: ${nextLevel.description}</div>
            <div>所需材料: ${costHtml}</div>
            <div>${toolsHtml}</div>
            <button id="upgrade-building-btn" class="upgrade-btn">升级住所</button>
        `;
        document.getElementById("upgrade-building-btn").onclick = upgradeBuilding;
    }
    function upgradeBuilding() {
        const currentLevel = currentUser.buildingLevel;
        if(currentLevel >= BUILDING_LEVELS.length - 1) {
            showMsg("已经是最高等级了！","#craft-msg");
            return;
        }
        const nextLevel = BUILDING_LEVELS[currentLevel+1];
        // 检查工具
        for(let tool of nextLevel.requiredTools) {
            const toolItem = currentUser.inventory.find(i=>i.name===tool);
            if(!toolItem || toolItem.amount < 1) {
                showMsg(`缺少工具: ${tool}`,"#craft-msg");
                return;
            }
        }
        // 检查材料
        for(let [mat, qty] of Object.entries(nextLevel.cost)) {
            const item = currentUser.inventory.find(i=>i.name===mat);
            if(!item || item.amount < qty) {
                showMsg(`缺少材料: ${mat} x${qty}`,"#craft-msg");
                return;
            }
        }
        // 扣除材料
        for(let [mat, qty] of Object.entries(nextLevel.cost)) {
            const idx = currentUser.inventory.findIndex(i=>i.name===mat);
            currentUser.inventory[idx].amount -= qty;
            if(currentUser.inventory[idx].amount === 0) currentUser.inventory.splice(idx,1);
        }
        // 工具不消耗，只是需要拥有
        currentUser.buildingLevel++;
        updateUser();
        showMsg(`成功升级到 ${nextLevel.name}！`,"#craft-msg");
        refreshInventoryDisplay();
        renderBuildingPanel();
    }

    // 钓鱼系统（带弹窗和下调高星级概率）
    function renderFishingPanel() {
        const panel = document.getElementById("fishing-panel");
        if(!panel) return;
        const hasFishingKit = currentUser.inventory.some(i=>i.name==="钓鱼套组");
        if(!hasFishingKit) {
            panel.innerHTML = "<div>⚠️ 你需要先合成【钓鱼套组】才能钓鱼！</div>";
            return;
        }
        const baits = currentUser.baitCount;
        panel.innerHTML = `
            <div class="flex-between">
                <div>🎣 鱼饵数量: 初级:${baits.初级} | 中级:${baits.中级} | 高级:${baits.高级}</div>
                <div>🎲 钓鱼概率受幸运和灵感影响，鱼饵提升概率，稀有鱼类更难钓到</div>
            </div>
            <div class="search-panel">
                <select id="bait-select">
                    <option value="初级">初级鱼饵 (50%基础)</option>
                    <option value="中级">中级鱼饵 (75%基础)</option>
                    <option value="高级">高级鱼饵 (100%基础)</option>
                </select>
                <button id="fish-btn" class="fish-btn">🎣 钓鱼 (消耗1份鱼饵)</button>
            </div>
        `;
        document.getElementById("fish-btn").onclick = fish;
    }
    function fish() {
        const baitType = document.getElementById("bait-select").value;
        const baitCount = currentUser.baitCount[baitType];
        if(baitCount <= 0) {
            showMsg(`没有${baitType}鱼饵了！先去合成一些吧。`,"#craft-msg");
            return;
        }
        // 计算钓鱼成功率
        let baseRate = 0.5;
        if(baitType === "中级") baseRate = 0.75;
        if(baitType === "高级") baseRate = 1.0;
        const luckBonus = (currentUser.stats.luck - 3) * 0.05; // 每点幸运±5%
        const inspBonus = (currentUser.stats.inspiration - 3) * 0.03; // 每点灵感±3%
        let finalRate = baseRate + luckBonus + inspBonus;
        finalRate = Math.min(1, Math.max(0, finalRate));
        const success = Math.random() < finalRate;
        if(success) {
            // 使用权重随机获取鱼
            const fish = getRandomFish();
            currentUser.inventory.push({name:fish.name, amount:fish.amount});
            currentUser.inventory = mergeInventory(currentUser.inventory);
            // 弹窗提示
            alert(`🎣 钓鱼成功！获得 ${fish.name} x${fish.amount}！`);
            showMsg(`获得 ${fish.name} x${fish.amount}`,"#craft-msg");
            refreshInventoryDisplay();
        } else {
            alert(`😢 钓鱼失败...什么都没钓到。`);
            showMsg(`钓鱼失败...`,"#craft-msg");
        }
        // 消耗鱼饵
        currentUser.baitCount[baitType]--;
        updateUser();
        renderFishingPanel();
    }

    // 合成系统
    function renderRecipes() {
        const div=document.getElementById("recipe-list");
        if(!div) return;
        const inv=currentUser.inventory;
        div.innerHTML=RECIPES.map((rec,idx)=>{
            let canCraft = true;
            if(rec.requireTool){
                const hasTool = inv.some(i=>i.name===rec.requireTool && i.amount>=1);
                if(!hasTool) canCraft = false;
            }
            for(const cost of rec.costs){
                const item = inv.find(i=>i.name===cost.name);
                if(!item || item.amount < cost.qty) canCraft = false;
            }
            if(rec.isFree && currentUser.freeBaitCraftedToday >= rec.maxFreeDaily) canCraft = false;
            let extraText = "";
            if(rec.isFree) extraText = ` (今日还可免费合成 ${rec.maxFreeDaily - currentUser.freeBaitCraftedToday} 次)`;
            return `<div class="recipe-card">
                        <div class="recipe-name">📐 ${rec.name} → ${rec.target} x${rec.targetAmount}</div>
                        <div class="recipe-desc">📖 ${getRecipeDescription(rec.target)}</div>
                        <div class="recipe-cost">${rec.costs.map(c=>`${c.name} x${c.qty}`).join(", ")}${rec.requireTool?` 🔧 需要工具: ${rec.requireTool}`:""}${extraText}</div>
                        <button class="craft-btn" data-idx="${idx}" ${canCraft?"":"disabled"}>🧪 合成</button>
                    </div>`;
        }).join("");
        document.querySelectorAll(".craft-btn:not([disabled])").forEach(btn=>btn.addEventListener("click",(e)=>craftRecipe(RECIPES[parseInt(btn.dataset.idx)])));
    }
    function craftRecipe(recipe) {
        const inv=currentUser.inventory;
        if(recipe.requireTool && !inv.some(i=>i.name===recipe.requireTool && i.amount>=1)){ showMsg(`缺少工具: ${recipe.requireTool}`,"#craft-msg"); return; }
        for(const cost of recipe.costs){ const item=inv.find(i=>i.name===cost.name); if(!item||item.amount<cost.qty){ showMsg("材料不足","#craft-msg"); return; } }
        if(recipe.isFree && currentUser.freeBaitCraftedToday >= recipe.maxFreeDaily){
            showMsg("今日免费合成次数已用完","#craft-msg");
            return;
        }
        for(const cost of recipe.costs){ const idx=inv.findIndex(i=>i.name===cost.name); inv[idx].amount-=cost.qty; if(inv[idx].amount===0) inv.splice(idx,1); }
        // 处理鱼饵产出
        if(recipe.target === "初级鱼饵") {
            currentUser.baitCount.初级 += recipe.targetAmount;
            currentUser.freeBaitCraftedToday++;
        } else if(recipe.target === "中级鱼饵") {
            currentUser.baitCount.中级 += recipe.targetAmount;
        } else if(recipe.target === "高级鱼饵") {
            currentUser.baitCount.高级 += recipe.targetAmount;
        } else {
            const existing=inv.find(i=>i.name===recipe.target);
            if(existing) existing.amount+=recipe.targetAmount;
            else inv.push({name:recipe.target,amount:recipe.targetAmount});
        }
        updateUser();
        showMsg(`✅ 合成 ${recipe.target} x${recipe.targetAmount}`,"#craft-msg");
        refreshInventoryDisplay();
        renderRecipes();
        renderFishingPanel(); // 刷新鱼饵显示
    }

    function updateUser() {
        const users=loadUsers();
        const idx=users.findIndex(u=>u.username===currentUser.username);
        if(idx!==-1) users[idx]=currentUser;
        saveUsers(users);
    }

    // 备份功能
    const BACKUP_KEY = "ember_backup";
    function saveToSessionStorage() {
        try {
            const backup = JSON.stringify(currentUser);
            sessionStorage.setItem(BACKUP_KEY, backup);
            const msgDiv = document.getElementById("backup-msg");
            msgDiv.innerText = "✅ 备份成功！当前账号数据已保存到会话存储。";
            msgDiv.style.display = "block";
            setTimeout(() => { msgDiv.style.display = "none"; }, 3000);
        } catch(e) {
            showMsg("备份失败：" + e.message, "#backup-msg");
        }
    }
    function loadFromSessionStorage() {
        const raw = sessionStorage.getItem(BACKUP_KEY);
        if (!raw) {
            showMsg("没有找到备份数据，请先保存备份。", "#backup-msg");
            return;
        }
        try {
            const backupUser = JSON.parse(raw);
            if (!backupUser.username || !backupUser.password || !backupUser.inventory) {
                throw new Error("备份数据不完整");
            }
            const users = loadUsers();
            const idx = users.findIndex(u => u.username === backupUser.username);
            if (idx !== -1) {
                users[idx] = backupUser;
            } else {
                users.push(backupUser);
            }
            saveUsers(users);
            currentUser = backupUser;
            render();
            showMsg("✅ 恢复成功！已从会话存储加载账号数据。", "#backup-msg");
        } catch(e) {
            showMsg("恢复失败：" + e.message, "#backup-msg");
        }
    }

    function showMsg(msg,selector="#craft-msg") {
        const el=document.querySelector(selector);
        if(el){el.innerText=msg;el.style.display="block";setTimeout(()=>el.style.display="none",3000);}
    }

    render();
</script>
</body>
</html>
