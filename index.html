        .recipe-card {

    function getRandomItemByTier(tier) {
        let pool = tier===3?TIER_3_ITEMS:(tier===4?TIER_4_ITEMS:TIER_5_ITEMS);
        if(!pool.length) return {name:"残羹剩饭",amount:1};
        const idx = Math.floor(Math.random()*pool.length);
        return {...pool[idx]};
    }
    function getTierByStats(intel,insp,luck) {
        let prob4=0.3, prob5=0;
        if(intel>=4) prob4+=0.2; if(insp>=4) prob4+=0.2; if(luck>=4) prob4+=0.2;
        if(intel===6) prob5+=0.1; if(insp===6) prob5+=0.1; if(luck===6) prob5+=0.1;
        prob4=Math.min(prob4,0.9); prob5=Math.min(prob5,0.3);
        const r=Math.random();
        if(r<prob5) return 5;
        if(r<prob5+prob4) return 4;
        return 3;
    }
    function performLoot(intel,insp,luck) {
        const tier=getTierByStats(intel,insp,luck);
        const item=getRandomItemByTier(tier);
        return {...item};
    }
    function mergeInventory(inv) {
        const map=new Map();
        for(const it of inv) {
            const key=it.name;
            if(map.has(key)) map.get(key).amount+=it.amount;
            else map.set(key,{name:key,amount:it.amount});
        }
        return Array.from(map.values());
    }
    function getBeijingDate() {
        const now=new Date();
        const offset=8*60;
        const localOffset=now.getTimezoneOffset();
        const beijing=new Date(now.getTime()+(offset+localOffset)*60000);
        return beijing.toISOString().slice(0,10);
    }
    function checkAndResetFreeSearches(user) {
        const today=getBeijingDate();
        if(!user.lastFreeReset||user.lastFreeReset!==today) {
            user.freeSearches=1;
            user.lastFreeReset=today;
            return true;
        }
        return false;
    }

    const STORAGE_KEY="EmberLong_users_final";
    let teamsStore = {};
    function loadUsers() {
        const raw=localStorage.getItem(STORAGE_KEY);
        if(raw) return JSON.parse(raw);
        return [];
    }
    function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY,JSON.stringify(users));
        rebuildTeamsFromUsers(users);
    }
    function rebuildTeamsFromUsers(users) {
        teamsStore={};
        for(const u of users) {
            if(u.teamId && !teamsStore[u.teamId]) {
                const teamData = u.teamData || {};
                teamsStore[u.teamId]={id:u.teamId, members:[], publicInventory:[], pendingQuitRequests:[], key: teamData.key || ""};
            }
        }
        for(const u of users) {
            if(u.teamId && teamsStore[u.teamId]) {
                teamsStore[u.teamId].members.push(u.username);
                if(u.teamData && u.teamData.key) teamsStore[u.teamId].key = u.teamData.key;
            }
        }
        for(const tid in teamsStore) {
            const team=teamsStore[tid];
            team.publicInventory=[];
            const sharedUsers=users.filter(u=>u.teamId===tid && u.isSharing);
            for(const su of sharedUsers) {
                for(const item of su.inventory) {
                    const existing=team.publicInventory.find(i=>i.name===item.name);
                    if(existing) existing.amount+=item.amount;
                    else team.publicInventory.push({name:item.name,amount:item.amount});
                }
                su.inventory=[];
            }
        }
        for(const u of users) {
            if(u.teamId && u.isSharing) u.inventory=[];
        }
        saveUsersRaw(users);
    }
    function saveUsersRaw(users) { localStorage.setItem(STORAGE_KEY,JSON.stringify(users)); }

            <div class="card"><h2>📜 幸存者档案</h2><div>力量 ${stats.strength} | 速度 ${stats.speed} | 智力 ${stats.intelligence} | 灵感 ${stats.inspiration} | 幸运 ${stats.luck} (总${stats.strength+stats.speed+stats.intelligence+stats.inspiration+stats.luck}/16)</div>
            <div class="search-panel"><div class="badge">✨ 今日免费搜寻: ${freeLeft} 次</div><button id="free-search-btn">🔍 免费搜寻</button><div class="input-group"><label>物资密码</label><input id="password-input"></div><button id="pwd-search-btn">🔐 密码搜寻</button></div></div>
            <div class="card"><h2>📦 随身物资 <span style="font-size:0.7rem;">(点击名称查看描述)</span></h2><div id="inventory-list" class="inventory-grid"></div></div>
            <div class="card"><h2>🤝 小队系统</h2><div id="team-panel"></div></div>

            <div class="card"><h2>⚒️ 废土工坊 · 合成</h2><div class="recipe-list" id="recipe-list"></div><div id="craft-msg" class="alert"></div></div>

    function refreshInventoryDisplay() {
        const div=document.getElementById("inventory-list");
        if(!div) return;
        let inv;
        if(currentUser.teamId && currentUser.isSharing && currentTeam) inv=currentTeam.publicInventory;
        else inv=currentUser.inventory;
        if(!inv.length){div.innerHTML="<div>空无一物</div>";return;}
        div.innerHTML=inv.map(item=>`<div class="inv-item"><span class="inv-name" title="${getItemDescription(item.name)}" onclick="alert('${getItemDescription(item.name).replace(/'/g,"\\'")}')">${item.name}</span><span class="inv-qty">✖️${item.amount}</span></div>`).join("");
    }

    function performFreeSearch() {
        checkAndResetFreeSearches(currentUser);
        if(currentUser.freeSearches<=0){showMsg("今日免费次数已用完","#craft-msg");return;}
        const stats=currentUser.stats;
        const loots=[];
        for(let i=0;i<3;i++){
            loots.push(performLoot(stats.intelligence,stats.inspiration,stats.luck));
        }
        alert("🔍 搜寻获得：\n" + loots.map(l => `${l.name} x${l.amount}`).join("\n"));
        for(const loot of loots){
            if(currentUser.teamId && currentUser.isSharing && currentTeam) {
                addToPublicAndContribution(currentTeam,loot);
            } else {
                currentUser.inventory.push(loot);
                currentUser.inventory=mergeInventory(currentUser.inventory);
            }
        }
        currentUser.freeSearches--;
        updateUserAndTeam();
        showMsg(`获得 ${loots.length} 个物资`,"#craft-msg");
        refreshInventoryDisplay();
        renderTeamPanel();
    }

    function performPasswordSearch(pwd) {
        const valid=Array.from({length:50},(_,i)=>(1001+i).toString());
        if(!valid.includes(pwd)){showMsg("密码错误","#craft-msg");return;}
        if(currentUser.usedPasswords.includes(pwd)){showMsg(`密码 ${pwd} 已使用过`,"#craft-msg");return;}
        const stats=currentUser.stats;
        const loots=[];
        for(let i=0;i<3;i++){
            loots.push(performLoot(stats.intelligence,stats.inspiration,stats.luck));
        }
        alert("🔐 密码搜寻获得：\n" + loots.map(l => `${l.name} x${l.amount}`).join("\n"));
        for(const loot of loots){
            if(currentUser.teamId && currentUser.isSharing && currentTeam) {
                addToPublicAndContribution(currentTeam,loot);
            } else {
                currentUser.inventory.push(loot);
                currentUser.inventory=mergeInventory(currentUser.inventory);
            }
        }
        currentUser.usedPasswords.push(pwd);
        updateUserAndTeam();
        showMsg(`获得 ${loots.length} 个物资`,"#craft-msg");
        refreshInventoryDisplay();
        renderTeamPanel();
    }

    function addToPublicAndContribution(team,item) {
        const existing=team.publicInventory.find(i=>i.name===item.name);
        if(existing) existing.amount+=item.amount;
        else team.publicInventory.push({name:item.name,amount:item.amount});
        const contribExisting=currentUser.contribution.find(c=>c.name===item.name);
        if(contribExisting) contribExisting.amount+=item.amount;
        else currentUser.contribution.push({name:item.name,amount:item.amount});
    }

    // 小队系统
    function renderTeamPanel() {
        const panel=document.getElementById("team-panel");
        if(!panel) return;
        if(!currentUser.teamId) {
            panel.innerHTML=`<div class="flex-between"><span>未加入任何小队</span><div><div class="input-group"><input id="invite-username" placeholder="用户名"></div><button id="create-team-btn">创建小队</button><button id="invite-btn">邀请加入</button></div></div>
            <div class="search-panel"><div class="input-group"><label>小队密钥</label><input id="join-key-input" placeholder="输入小队密钥"></div><button id="join-by-key-btn">密钥加入</button></div>`;
            document.getElementById("create-team-btn")?.addEventListener("click",createTeam);
            document.getElementById("invite-btn")?.addEventListener("click",()=>sendInvite(document.getElementById("invite-username").value.trim()));
            document.getElementById("join-by-key-btn")?.addEventListener("click",()=>{const key=document.getElementById("join-key-input").value.trim();if(key)joinTeamByKey(key);else showMsg("请输入密钥","#craft-msg");});
            return;
        }
        const team=teamsStore[currentUser.teamId];
        if(!team) {currentUser.teamId=null;updateUserAndTeam();renderTeamPanel();return;}
        currentTeam=team;
        const membersHtml=team.members.map(uname=>{
            const user=loadUsers().find(u=>u.username===uname);
            const shareStatus=user?.isSharing?"共享中":"私有";
            const isCurrent=uname===currentUser.username;
            return `<div class="member-item"><span>${uname}${isCurrent?" (你)":""} - ${shareStatus}</span>${isCurrent?`<button id="toggle-share-btn">${currentUser.isSharing?"退出共享":"加入共享"}</button><button id="quit-team-btn" class="danger-btn">退出小队</button>`:""}</div>`;
        }).join("");
        let pendingHtml="";
        if(team.pendingQuitRequests && team.pendingQuitRequests.length>0){
            pendingHtml="<h4>待处理退出请求</h4>";
            team.pendingQuitRequests.forEach((req,idx)=>{
                const itemsStr=req.items.map(i=>`${i.name} x${i.amount}`).join(", ");
                const voted=req.votes.includes(currentUser.username);
                pendingHtml+=`<div class="vote-request"><strong>${req.username}</strong> 请求带走: ${itemsStr}<br>同意票: ${req.votes.length}/${team.members.length}${voted?" (已投票)":` <button class="vote-yes" data-idx="${idx}">同意</button>`}</div>`;
            });
        }
        panel.innerHTML=`<div><strong>小队密钥：</strong><span class="team-key">${team.key || "未设置"}</span></div>
        <h3>小队成员</h3><div class="member-list">${membersHtml}</div>
        <div class="flex-between"><div class="input-group"><input id="invite-new" placeholder="邀请用户名"></div><button id="invite-member-btn">邀请加入</button></div>
        ${currentUser.isSharing?`<div><strong>小队公共仓库</strong><div id="team-inventory" class="inventory-grid" style="max-height:200px;"></div></div>`:""}
        ${pendingHtml}`;
        document.getElementById("toggle-share-btn")?.addEventListener("click",toggleShare);
        document.getElementById("quit-team-btn")?.addEventListener("click",startQuit);
        document.getElementById("invite-member-btn")?.addEventListener("click",()=>sendInvite(document.getElementById("invite-new").value.trim()));
        if(currentUser.isSharing && team.publicInventory) {
            const teamInvDiv=document.getElementById("team-inventory");
            if(teamInvDiv) teamInvDiv.innerHTML=team.publicInventory.map(i=>`<div class="inv-item"><span>${i.name}</span><span>✖️${i.amount}</span></div>`).join("");
        }
        document.querySelectorAll(".vote-yes").forEach(btn=>{
            btn.addEventListener("click",()=>{
                const idx=parseInt(btn.dataset.idx);
                const req=team.pendingQuitRequests[idx];
                if(req && !req.votes.includes(currentUser.username)){
                    req.votes.push(currentUser.username);
                    if(req.votes.length > team.members.length/2) executeQuit(req.username);
                    else { updateUserAndTeam(); renderTeamPanel(); }
                }
            });
        });
    }

    function createTeam() {
        if(currentUser.teamId){showMsg("已在小队中","#craft-msg");return;}
        const teamId="team_"+Date.now()+"_"+Math.random().toString(36);
        const teamKey = Math.random().toString(36).substring(2,8).toUpperCase();
        const newTeam={id:teamId, members:[currentUser.username], publicInventory:[], pendingQuitRequests:[], key: teamKey};
        teamsStore[teamId]=newTeam;
        currentUser.teamId=teamId;
        currentUser.isSharing=false;
        currentUser.contribution=[];
        currentUser.teamData = { key: teamKey };
        updateUserAndTeam();
        renderDashboard(document.getElementById("app"));
        showMsg(`小队创建成功！密钥：${teamKey}，可分享给其他玩家加入。`,"#craft-msg");
    }

    function joinTeamByKey(key) {
        if(currentUser.teamId){showMsg("你已在小队中，请先退出当前小队","#craft-msg");return;}
        let targetTeam = null;
        for(const tid in teamsStore) if(teamsStore[tid].key === key) { targetTeam = teamsStore[tid]; break; }
        if(!targetTeam){showMsg("无效的小队密钥","#craft-msg");return;}
        targetTeam.members.push(currentUser.username);
        currentUser.teamId = targetTeam.id;
        currentUser.isSharing = false;
        currentUser.contribution = [];
        currentUser.teamData = { key: targetTeam.key };
        updateUserAndTeam();
        renderDashboard(document.getElementById("app"));
        showMsg(`成功加入小队！`,"#craft-msg");
    }

    function sendInvite(targetName) {
        if(!targetName){showMsg("输入用户名","#craft-msg");return;}
        if(targetName===currentUser.username){showMsg("不能邀请自己","#craft-msg");return;}
        const users=loadUsers();
        const target=users.find(u=>u.username===targetName);
        if(!target){showMsg("用户不存在","#craft-msg");return;}
        if(target.teamId){showMsg("对方已有小队","#craft-msg");return;}
        if(!currentUser.teamId){showMsg("请先创建小队","#craft-msg");return;}
        const team=teamsStore[currentUser.teamId];
        if(team.members.includes(targetName)){showMsg("已在队中","#craft-msg");return;}
        team.members.push(targetName);
        target.teamId=currentUser.teamId;
        target.isSharing=false;
        target.contribution=[];
        target.teamData = { key: team.key };
        saveUsers(users);
        rebuildTeamsFromUsers(loadUsers());
        currentTeam=teamsStore[currentUser.teamId];
        showMsg(`已邀请 ${targetName} 加入`,"#craft-msg");
        renderTeamPanel();
    }

    function toggleShare() {
        if(!currentUser.teamId) return;
        const team=teamsStore[currentUser.teamId];
        if(!team) return;
        if(!currentUser.isSharing) {
            for(const item of currentUser.inventory) addToPublicAndContribution(team,item);
            currentUser.inventory=[];
            currentUser.isSharing=true;
        } else {
            currentUser.isSharing=false;
        }
        updateUserAndTeam();
        renderTeamPanel();
        refreshInventoryDisplay();
        showMsg(`已${currentUser.isSharing?"加入共享":"退出共享"}`,"#craft-msg");
    }

    function startQuit() {
        if(!currentUser.teamId) return;
        const team=teamsStore[currentUser.teamId];
        if(!team) return;
        if(!currentUser.isSharing) {
            executeQuit(currentUser.username);
            return;
        }
        const contribution=currentUser.contribution;
        if(!contribution.length){
            executeQuit(currentUser.username);
            return;
        }
        let modal=document.createElement("div");
        modal.style.position="fixed";modal.style.top="50%";modal.style.left="50%";modal.style.transform="translate(-50%,-50%)";
        modal.style.background="#1b2329";modal.style.padding="20px";modal.style.borderRadius="28px";modal.style.zIndex=1000;modal.style.width="400px";
        let options=contribution.map(c=>`<div><label>${c.name} (最多 ${c.amount})</label><input type="number" min="0" max="${c.amount}" data-name="${c.name}" value="0" class="quit-qty"></div>`).join("");
        modal.innerHTML=`<h3>选择要带走的物资（不超过贡献）</h3>${options}<button id="submit-quit">确认并申请退出</button><button id="cancel-quit">取消</button>`;
        document.body.appendChild(modal);
        const overlay=document.createElement("div");
        overlay.style.position="fixed";overlay.style.top=0;overlay.style.left=0;overlay.style.right=0;overlay.style.bottom=0;
        overlay.style.background="rgba(0,0,0,0.7)";overlay.style.zIndex=999;
        document.body.appendChild(overlay);
        document.getElementById("submit-quit").onclick=()=>{
            const items=[];
            document.querySelectorAll(".quit-qty").forEach(input=>{
                const qty=parseInt(input.value);
                if(qty>0){
                    const name=input.dataset.name;
                    items.push({name,amount:qty});
                }
            });
            if(items.length===0){ alert("请至少选择一件物资"); return; }
            let valid=true;
            for(const it of items){
                const contrib=contribution.find(c=>c.name===it.name);
                if(!contrib || it.amount>contrib.amount) valid=false;
            }
            if(!valid){alert("选择数量超过贡献");return;}
            const request={username:currentUser.username,items, votes:[]};
            if(!team.pendingQuitRequests) team.pendingQuitRequests=[];
            team.pendingQuitRequests.push(request);
            updateUserAndTeam();
            modal.remove();overlay.remove();
            showMsg("退出请求已发送，等待小队投票","#craft-msg");
            renderTeamPanel();
        };
        document.getElementById("cancel-quit").onclick=()=>{modal.remove();overlay.remove();};
    }

    function executeQuit(username) {
        const users=loadUsers();
        const user=users.find(u=>u.username===username);
        if(!user) return;
        const team=teamsStore[user.teamId];
        if(!team) return;
        let pendingReq=null;
        if(team.pendingQuitRequests){
            const idx=team.pendingQuitRequests.findIndex(r=>r.username===username);
            if(idx!==-1) pendingReq=team.pendingQuitRequests[idx];
        }
        if(user.isSharing && pendingReq){
            for(const it of pendingReq.items){
                const pubItem=team.publicInventory.find(i=>i.name===it.name);
                if(pubItem) pubItem.amount-=it.amount;
                const userItem=user.inventory.find(i=>i.name===it.name);
                if(userItem) userItem.amount+=it.amount;
                else user.inventory.push({name:it.name,amount:it.amount});
                const contrib=user.contribution.find(c=>c.name===it.name);
                if(contrib) contrib.amount-=it.amount;
            }
            team.publicInventory=team.publicInventory.filter(i=>i.amount>0);
            user.inventory=mergeInventory(user.inventory);
            user.contribution=user.contribution.filter(c=>c.amount>0);
        }
        team.members=team.members.filter(m=>m!==username);
        user.teamId=null;
        user.isSharing=false;
        user.teamData={};
        if(team.pendingQuitRequests) team.pendingQuitRequests=team.pendingQuitRequests.filter(r=>r.username!==username);
        if(team.members.length===0) delete teamsStore[team.id];
        saveUsers(users);
        if(username===currentUser.username){
            currentUser=user;
            currentTeam=null;
            renderDashboard(document.getElementById("app"));
        } else {
            renderTeamPanel();
        }
        showMsg(`${username} 已退出小队`,"#craft-msg");
    }

            if(targetName === currentUser.username){showMsg("不能添加自己为好友","#craft-msg");return;}

    // 赠予系统
    function showGiftPanel() {
        const targetName=document.getElementById("gift-target").value.trim();
        if(!targetName){showMsg("请输入用户名","#craft-msg");return;}
        const users=loadUsers();
        const target=users.find(u=>u.username===targetName);
        if(!target){showMsg("用户不存在","#craft-msg");return;}
        if(target.username===currentUser.username){showMsg("不能赠送给自己","#craft-msg");return;}
        let sourceInv;
        if(currentUser.teamId && currentUser.isSharing && currentTeam) sourceInv=currentTeam.publicInventory;
        else sourceInv=currentUser.inventory;
        if(sourceInv.length===0){showMsg("没有物资可赠送","#craft-msg");return;}
        let options=sourceInv.map(i=>`<option value="${i.name}">${i.name} (x${i.amount})</option>`).join("");
        let modal=document.createElement("div");
        modal.id="gift-modal";
        modal.style.position="fixed";modal.style.top="50%";modal.style.left="50%";modal.style.transform="translate(-50%,-50%)";
        modal.style.background="#1b2329";modal.style.padding="20px";modal.style.borderRadius="28px";modal.style.zIndex=1000;modal.style.width="300px";
        modal.innerHTML=`<h3>赠送物资给 ${targetName}</h3><select id="gift-item">${options}</select><input id="gift-qty" type="number" min="1" placeholder="数量"><button id="confirm-gift">赠送</button><button id="close-gift">取消</button>`;
        document.body.appendChild(modal);
        const overlay=document.createElement("div");
        overlay.style.position="fixed";overlay.style.top=0;overlay.style.left=0;overlay.style.right=0;overlay.style.bottom=0;
        overlay.style.background="rgba(0,0,0,0.7)";overlay.style.zIndex=999;
        document.body.appendChild(overlay);
        document.getElementById("confirm-gift").onclick=()=>{
            const itemName=document.getElementById("gift-item").value;
            const qty=parseInt(document.getElementById("gift-qty").value);
            if(isNaN(qty)||qty<=0){alert("数量无效");return;}
            let srcInv;
            if(currentUser.teamId && currentUser.isSharing && currentTeam) srcInv=currentTeam.publicInventory;
            else srcInv=currentUser.inventory;
            const srcItem=srcInv.find(i=>i.name===itemName);
            if(!srcItem||srcItem.amount<qty){alert("物资不足");return;}
            srcItem.amount-=qty;
            if(srcItem.amount===0) srcInv.splice(srcInv.indexOf(srcItem),1);
            const targetUser=users.find(u=>u.username===targetName);
            if(targetUser){
                if(targetUser.teamId && targetUser.isSharing && teamsStore[targetUser.teamId]){
                    const team=teamsStore[targetUser.teamId];
                    const pubItem=team.publicInventory.find(i=>i.name===itemName);
                    if(pubItem) pubItem.amount+=qty;
                    else team.publicInventory.push({name:itemName,amount:qty});
                    const contrib=targetUser.contribution.find(c=>c.name===itemName);
                    if(contrib) contrib.amount+=qty;
                    else targetUser.contribution.push({name:itemName,amount:qty});
                } else {
                    const existing=targetUser.inventory.find(i=>i.name===itemName);
                    if(existing) existing.amount+=qty;
                    else targetUser.inventory.push({name:itemName,amount:qty});
                }
                saveUsers(users);
            }
            updateUserAndTeam();
            modal.remove();overlay.remove();
            showMsg(`成功赠送 ${qty} 个 ${itemName} 给 ${targetName}`,"#craft-msg");
            renderDashboard(document.getElementById("app"));
        };
        document.getElementById("close-gift").onclick=()=>{modal.remove();overlay.remove();};
    }

    // 合成工坊
    function renderRecipes() {
        const div=document.getElementById("recipe-list");
        if(!div) return;
        let inv;
        if(currentUser.teamId && currentUser.isSharing && currentTeam) inv=currentTeam.publicInventory;
        else inv=currentUser.inventory;
        div.innerHTML=RECIPES.map((rec,idx)=>{
            let canCraft = true;
            if(rec.requireTool){
                const hasTool = inv.some(i=>i.name===rec.requireTool && i.amount>=1);
                if(!hasTool) canCraft = false;
            }
            for(const cost of rec.costs){
                const item = inv.find(i=>i.name===cost.name);
                if(!item || item.amount < cost.qty) canCraft = false;
            }
            return `<div class="recipe-card">
                        <div class="recipe-name">📐 ${rec.name} → ${rec.target} x${rec.targetAmount}</div>
                        <div class="recipe-desc">📖 ${getRecipeDescription(rec.target)}</div>
                        <div class="recipe-cost">${rec.costs.map(c=>`${c.name} x${c.qty}`).join(", ")}${rec.requireTool?` 🔧 需要工具: ${rec.requireTool}`:""}</div>
                        <button class="craft-btn" data-idx="${idx}" ${canCraft?"":"disabled"}>🧪 合成</button>
                    </div>`;
        }).join("");
        document.querySelectorAll(".craft-btn:not([disabled])").forEach(btn=>btn.addEventListener("click",(e)=>craftRecipe(RECIPES[parseInt(btn.dataset.idx)])));
    }

    function craftRecipe(recipe) {
        let inv, isPublic=false;
        if(currentUser.teamId && currentUser.isSharing && currentTeam) { inv=currentTeam.publicInventory; isPublic=true; }
        else inv=currentUser.inventory;
        if(recipe.requireTool && !inv.some(i=>i.name===recipe.requireTool && i.amount>=1)){ showMsg(`缺少工具: ${recipe.requireTool}`,"#craft-msg"); return; }
        for(const cost of recipe.costs){ const item=inv.find(i=>i.name===cost.name); if(!item||item.amount<cost.qty){ showMsg("材料不足","#craft-msg"); return; } }
        for(const cost of recipe.costs){ const idx=inv.findIndex(i=>i.name===cost.name); inv[idx].amount-=cost.qty; if(inv[idx].amount===0) inv.splice(idx,1); }
        const existing=inv.find(i=>i.name===recipe.target);
        if(existing) existing.amount+=recipe.targetAmount;
        else inv.push({name:recipe.target,amount:recipe.targetAmount});
        if(isPublic && currentTeam){
            const contribExisting=currentUser.contribution.find(c=>c.name===recipe.target);
            if(contribExisting) contribExisting.amount+=recipe.targetAmount;
            else currentUser.contribution.push({name:recipe.target,amount:recipe.targetAmount});
        }
        updateUserAndTeam();
        showMsg(`✅ 合成 ${recipe.target} x${recipe.targetAmount}`,"#craft-msg");
        refreshInventoryDisplay();
        renderRecipes();
        renderTeamPanel();
    }

    function updateUserAndTeam() {
        const users=loadUsers();
        const idx=users.findIndex(u=>u.username===currentUser.username);
        if(idx!==-1) users[idx]=currentUser;
        saveUsers(users);
        if(currentUser.teamId) currentTeam=teamsStore[currentUser.teamId];
        else currentTeam=null;
    }

    function showMsg(msg,selector="#craft-msg") {
        const el=document.querySelector(selector);
        if(el){el.innerText=msg;el.style.display="block";setTimeout(()=>el.style.display="none",3000);}
    }

    render();
</script>
</body>
</html>
